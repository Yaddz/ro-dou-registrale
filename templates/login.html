<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Registrale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200 border border-slate-100 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="bg-slate-900 text-white rounded-2xl p-3 inline-block shadow-lg mb-4">
                <i data-lucide="bot-message-square" class="w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight text-slate-900">Registrale</h1>
            <p class="text-slate-400 text-sm font-medium mt-1 uppercase tracking-widest">Monitor DOU</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-100 text-red-600 text-xs font-bold p-4 rounded-xl mb-6 flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Usuário</label>
                <input type="text" name="username" required placeholder="admin" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-slate-900/5 transition-all">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Senha</label>
                <input type="password" name="password" required placeholder="••••••••" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-slate-900/5 transition-all">
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition-all shadow-xl shadow-slate-200 active:scale-95">
                Entrar no Sistema
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-xs text-slate-400 font-medium">Acesso restrito a usuários autorizados</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
